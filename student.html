<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Elevate</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <a href="index.html" class="logo">
      <i class="ph ph-graduation-cap"></i> Elevate
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="student.html" class="active">Student Dashboard</a></li>
      <li><a href="teacher.html">Teacher Portal</a></li>
    </ul>
  </nav>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2><span class="text-gradient">My Courses</span></h2>
      <div class="badge badge-blue">Student View</div>
    </div>

    <div class="grid" id="course-list">
      <!-- Courses will be injected here by JS -->
    </div>
  </div>

  <!-- Modal for Materials -->
  <div class="modal" id="materials-modal">
    <div class="glass-card" style="width: 100%; max-width: 600px; position: relative;">
      <button class="close-modal" id="close-modal"><i class="ph ph-x"></i></button>
      <h3 id="modal-course-title" style="margin-bottom: 0.5rem;">Course Title</h3>
      <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Available Study Materials</p>
      
      <div id="materials-list" style="max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px;">
        <!-- Materials will be injected here -->
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCourses();

      document.getElementById('close-modal').addEventListener('click', () => {
        document.getElementById('materials-modal').classList.remove('active');
      });
    });

    function renderCourses() {
      const courses = getCourses();
      const container = document.getElementById('course-list');
      container.innerHTML = '';

      if (courses.length === 0) {
        container.innerHTML = `<p style="color: var(--text-muted);">No courses available. Check back soon!</p>`;
        return;
      }

      courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'glass-card';
        card.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
            <span class="badge ${course.category === 'Computer Science' ? 'badge-blue' : 'badge-violet'}">${course.category}</span>
            <i class="ph ph-bookmark-simple" style="font-size: 1.5rem; color: var(--text-muted);"></i>
          </div>
          <h3 style="margin-bottom: 0.5rem;">${course.title}</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">${course.description}</p>
          <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 1.5rem;">
            <i class="ph ph-user"></i> ${course.instructor}
          </div>
          <button class="btn btn-outline" style="width: 100%; justify-content: center;" onclick="openMaterials('${course.id}')">
            View Syllabus & Notes (${course.materials.length})
          </button>
        `;
        container.appendChild(card);
      });
    }

    function openMaterials(courseId) {
      const courses = getCourses();
      const course = courses.find(c => c.id === courseId);
      if (!course) return;

      document.getElementById('modal-course-title').innerText = course.title;
      const materialsList = document.getElementById('materials-list');
      materialsList.innerHTML = '';

      if (course.materials.length === 0) {
        materialsList.innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--text-muted);">No notes uploaded yet.</div>`;
      } else {
        course.materials.forEach(mat => {
          materialsList.innerHTML += `
            <div class="list-item">
              <div style="display: flex; align-items: center; gap: 1rem;">
                <i class="ph ph-file-pdf" style="font-size: 2rem; color: var(--accent);"></i>
                <div>
                  <h4 style="font-size: 1rem; margin: 0;">${mat.title}</h4>
                  <small style="color: var(--text-muted);">${mat.size} • Uploaded ${mat.date}</small>
                </div>
              </div>
              <button class="btn btn-primary" style="padding: 0.5rem; border-radius: 8px;" onclick="showToast('Downloading ${mat.title} mock file...')">
                <i class="ph ph-download-simple"></i>
              </button>
            </div>
          `;
        });
      }

      document.getElementById('materials-modal').classList.add('active');
    }
  </script>
</body>
</html>
