<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #7209b7;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #560bad;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Student Login</h2>

    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>

  <!-- 🔥 Firebase + Auth -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFS-bKBf1dyveUJd8pfCNIVVKNUeagaYA",
      authDomain: "elerning-app-e00c6.firebaseapp.com",
      projectId: "elerning-app-e00c6",
      storageBucket: "elerning-app-e00c6.firebasestorage.app",
      messagingSenderId: "367800679797",
      appId: "1:367800679797:web:76cb276c2dd4dd3581673c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Signup
    window.signup = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Signup Success ✅");
        })
        .catch((error) => {
          alert(error.message);
        });
    };

    // Login
    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Login Success ✅");
          window.location.href = "student-dashboard.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    };
  </script>

</body>

</html>
