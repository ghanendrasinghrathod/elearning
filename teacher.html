<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal</title>
</head>

<body>

<h2>Create Course</h2>
<form id="create-course-form">
  <input type="text" id="c-title" placeholder="Course Title" required>
  <input type="text" id="c-cat" placeholder="Category" required>
  <input type="text" id="c-instructor" placeholder="Instructor" required>
  <textarea id="c-desc" placeholder="Description"></textarea>
  <button type="submit">Create Course</button>
</form>

<hr>

<h2>Upload Material</h2>
<form id="upload-material-form">
  <select id="m-course"></select>
  <input type="text" id="m-title" placeholder="File Title" required>
  <input type="file" id="m-file" required>
  <button type="submit">Upload</button>
</form>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://iuhlwmsbmdhawavbsxes.supabase.co",
  "sb_publishable_HLC_52FAnlzjCrsPiXNiKA_zCLMehLn"
);

// 🔥 Load courses
async function loadCourses() {
  const { data } = await supabaseClient.from('courses').select('*');

  const select = document.getElementById('m-course');
  select.innerHTML = '';

  if (!data || data.length === 0) {
    select.innerHTML = '<option>No courses</option>';
    return;
  }

  data.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.innerText = c.title;
    select.appendChild(opt);
  });
}

document.addEventListener('DOMContentLoaded', () => {

  loadCourses();

  // ✅ Create course
  document.getElementById('create-course-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const title = document.getElementById('c-title').value;
    const cat = document.getElementById('c-cat').value;
    const instructor = document.getElementById('c-instructor').value;
    const desc = document.getElementById('c-desc').value;

    const { error } = await supabaseClient
      .from('courses')
      .insert([{ title, category: cat, instructor, description: desc }]);

    if (error) {
      alert("❌ Course create failed");
      return;
    }

    alert("✅ Course created");
    e.target.reset();
    loadCourses();
  });

  // ✅ Upload file
  document.getElementById('upload-material-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const courseId = document.getElementById('m-course').value;
    const title = document.getElementById('m-title').value;
    const file = document.getElementById('m-file').files[0];

    if (!file) {
      alert("File select kar");
      return;
    }

    const filePath = "uploads/" + Date.now() + "_" + file.name;

    // Upload file
    const { error } = await supabaseClient.storage
      .from("uploads")
      .upload(filePath, file);

    if (error) {
      alert("❌ Upload failed");
      return;
    }

    // Get URL
    const { data } = supabaseClient.storage
      .from("uploads")
      .getPublicUrl(filePath);

    const fileURL = data.publicUrl;

    // Save in DB
    await supabaseClient.from('materials').insert([
      { course_id: courseId, title, file_url: fileURL }
    ]);

    alert("🚀 Upload successful");
    e.target.reset();
  });

});
</script>

</body>
</html>
