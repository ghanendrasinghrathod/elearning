<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal</title>
</head>

<body>

<h2>Create Course</h2>
<form id="create-course-form">
  <input type="text" id="c-title" placeholder="Course Title" required>
  <input type="text" id="c-cat" placeholder="Category" required>
  <input type="text" id="c-instructor" placeholder="Instructor" required>
  <textarea id="c-desc" placeholder="Description"></textarea>
  <button type="submit">Create Course</button>
</form>

<hr>

<h2>Upload Material</h2>
<form id="upload-material-form">
  <select id="m-course">
    <option value="">Select Course</option>
  </select>
  <input type="text" id="m-title" placeholder="File Title" required>
  <input type="file" id="m-file" required>
  <button type="submit">Upload</button>
</form>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseClient = createClient(
  "https://iuhlwmsbmdhawavbsxes.supabase.co",
  "sb_publishable_4lVVKhZpkOsNL14HB4Yd2w_YNlMl8EX"
);

// 🔥 Load courses
async function loadCourses() {
  const { data, error } = await supabaseClient.from('courses').select('*');

  const select = document.getElementById('m-course');
  select.innerHTML = '<option value="">Select Course</option>';

  if (error) {
    alert("Courses load error");
    return;
  }

  data.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.title;
    select.appendChild(opt);
  });
}

document.addEventListener('DOMContentLoaded', () => {

  loadCourses();

  // ✅ Create course
  document.getElementById('create-course-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const title = c-title.value;
    const cat = c-cat.value;
    const instructor = c-instructor.value;
    const desc = c-desc.value;

    const { error } = await supabaseClient
      .from('courses')
      .insert([{ title, category: cat, instructor, description: desc }]);

    if (error) {
      alert("❌ Course create failed: " + error.message);
      return;
    }

    alert("✅ Course created");
    e.target.reset();
    loadCourses();
  });

  // ✅ Upload file
  document.getElementById('upload-material-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const courseId = document.getElementById('m-course').value;
    const title = document.getElementById('m-title').value;
    const file = document.getElementById('m-file').files[0];

    if (!courseId) {
      alert("Course select kar ❌");
      return;
    }

    if (!file) {
      alert("File select kar ❌");
      return;
    }

    try {
      const filePath = `${Date.now()}_${file.name}`;

      console.log("Uploading...");

      const { data, error } = await supabaseClient.storage
        .from("uploads")
        .upload(filePath, file, {
          upsert: true,
          contentType: file.type || "application/octet-stream"
        });

      if (error) {
        alert("❌ Upload failed: " + error.message);
        return;
      }

      const { data: publicUrlData } = supabaseClient.storage
        .from("uploads")
        .getPublicUrl(filePath);

      const fileURL = publicUrlData.publicUrl;

      const { error: dbError } = await supabaseClient
        .from('materials')
        .insert([
          { course_id: courseId, title, file_url: fileURL }
        ]);

      if (dbError) {
        alert("❌ DB save failed: " + dbError.message);
        return;
      }

      alert("🚀 Upload successful");
      e.target.reset();

    } catch (err) {
      console.error(err);
      alert("Something went wrong ❌");
    }
  });

});
</script>

</body>
</html>
