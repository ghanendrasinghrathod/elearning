<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #7209b7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #560bad;
        }
    </style>
</head>

<body>

    <h1>Welcome Student 🎓🔥</h1>
    <p>You are successfully logged in ✅</p>

    <!-- 🔥 Logout Button -->
    <button onclick="logout()">Logout</button>

    <!-- 🔥 Script -->
    <script>
        console.log("Dashboard Loaded ✅");

        function logout() {
            alert("Logged out ❌");
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
