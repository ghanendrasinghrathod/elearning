<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#3a0ca3);
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

h2 {
  margin: 0;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* SELECT */
select {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
  width: 100%;
  font-size: 16px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* BUTTONS */
button {
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
  font-weight: bold;
}

.view {
  background: #4cc9f0;
  color: black;
}

.download {
  background: #7209b7;
  color: white;
}

.logout {
  background: red;
  color: white;
  margin-top: 10px;
}

/* PDF */
iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
  margin-top: 15px;
  border: none;
}

/* TEXT FIX */
h3, h4 {
  color: white;
}
</style>
</head>

<body>

<header>
  <h2>📚 Student Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<h3>Select Course</h3>
<select id="course-select"></select>

<h3>Materials</h3>
<div id="materials"></div>

<h3>📄 PDF Preview</h3>
<iframe id="viewer"></iframe>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseClient = createClient(
  "https://iuhlwmsbmdhawavbsxes.supabase.co",
  "sb_publishable_4lVVKhZpkOsNL14HB4Yd2w_YNlMl8EX"
);

// LOAD COURSES
async function loadCourses() {
  const { data } = await supabaseClient.from('courses').select('*');

  const select = document.getElementById('course-select');
  select.innerHTML = '<option value="">Select Course</option>';

  data.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.title;
    select.appendChild(opt);
  });
}

// LOAD MATERIALS
async function loadMaterials(courseId) {
  const { data } = await supabaseClient
    .from('materials')
    .select('*')
    .eq('course_id', courseId);

  const container = document.getElementById('materials');
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No materials ❌</p>";
    return;
  }

  data.forEach(m => {
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <h4>${m.title}</h4>

      <button class="view" onclick="viewPDF('${m.file_url}')">👁 View</button>

      <a href="${m.file_url}" target="_blank">
        <button class="download">⬇ Download</button>
      </a>
    `;

    container.appendChild(div);
  });
}

// CHANGE EVENT
document.getElementById('course-select').addEventListener('change', (e) => {
  loadMaterials(e.target.value);
});

// VIEW PDF
window.viewPDF = function(url) {
  document.getElementById('viewer').src = url;
};

// LOGOUT
window.logout = function() {
  location.href = "index.html";
};

// START
loadCourses();

</script>

</body>
</html>
