<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
</head>

<body>

<h2>📚 Student Dashboard</h2>

<button onclick="logout()">Logout</button>

<hr>

<h3>Select Course</h3>
<select id="course-select"></select>

<hr>

<h3>Materials</h3>
<div id="materials"></div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 Supabase
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCFS-bKBf1dyveUJd8pfCNIVVKNUeagaYA",
  authDomain: "elerning-app-e00c6.firebaseapp.com",
  projectId: "elerning-app-e00c6",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Supabase
const supabaseClient = createClient(
  "https://iuhlwmsbmdhawavbsxes.supabase.co",
  "sb_publishable_4lVVKhZpkOsNL14HB4Yd2w_YNlMl8EX"
);

// 🔐 Protect page
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.replace("index.html");
  }
});

// 🔓 Logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.replace("index.html");
  });
};

// 🔥 Load courses
async function loadCourses() {
  const { data } = await supabaseClient.from('courses').select('*');

  const select = document.getElementById('course-select');
  select.innerHTML = '<option value="">Select Course</option>';

  data.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.title;
    select.appendChild(opt);
  });
}

// 🔥 Load materials
async function loadMaterials(courseId) {
  const { data } = await supabaseClient
    .from('materials')
    .select('*')
    .eq('course_id', courseId);

  const container = document.getElementById('materials');
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = "No materials ❌";
    return;
  }

  data.forEach(m => {
    const div = document.createElement('div');

    div.innerHTML = `
      <p><b>${m.title}</b></p>

      <a href="${m.file_url}" target="_blank">👁 View</a>
      <br>
      <a href="${m.file_url}" download>⬇ Download</a>
      <hr>
    `;

    container.appendChild(div);
  });
}

// 🎯 Course change
document.getElementById('course-select').addEventListener('change', (e) => {
  const courseId = e.target.value;
  if (courseId) loadMaterials(courseId);
});

// 🚀 Start
loadCourses();

</script>

</body>
</html>
</html>
